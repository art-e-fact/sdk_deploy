# Humble-specific alternatives to compare against real robot (Foxy) params.
# These can be swapped into nav2_params.yaml to test if Humble features
# perform better than the field-tested Foxy config.
#
# To use: replace the corresponding sections in nav2_params.yaml.

# --- AMCL: OmniMotionModel (replaces DifferentialMotionModel) ---
# The Lite3 is a quadruped that can strafe, so Omni may be more accurate.
# amcl:
#   ros__parameters:
#     robot_model_type: "nav2_amcl::OmniMotionModel"

